<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f9f9f9;
    }
    h1 {
      margin: 0 0 12px 0;
      font-size: 18px;
      color: #667eea;
    }
    .info {
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }
    .status {
      background: #fff;
      border: 1px solid #ddd;
      padding: 8px;
      border-radius: 4px;
      margin: 12px 0;
      font-size: 12px;
    }
    .status.online {
      border-color: #28a745;
      background: #f0f8f5;
      color: #155724;
    }
    .status.offline {
      border-color: #dc3545;
      background: #f8d7da;
      color: #721c24;
    }
    button {
      width: 100%;
      padding: 8px 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s;
    }
    button:hover {
      background: #764ba2;
    }
  </style>
</head>
<body>
  <h1>🔍 Chip Fact Checker</h1>
  
  <div class="info">
    <p><strong>How to use:</strong></p>
    <ul style="margin: 8px 0; padding-left: 20px; font-size: 12px;">
      <li>Open any Reddit post or comment</li>
      <li>Click the <strong>"🔍 Fact Check"</strong> button</li>
      <li>Chip AI will analyze claims</li>
      <li>Results appear in seconds!</li>
    </ul>
  </div>
  
  <div class="status online" id="status">
    ✓ Connected to Chip AI
  </div>
  
  <div style="font-size: 11px; color: #999; text-align: center; margin-top: 12px;">
    v1.0.0 | Powered by Chip & Qwen 3.5
  </div>
</body>
</html>
